name: astrbot_plugin_e2b_sandbox
author: sl251
version: "1.2.0"
astrbot_version: ">=4.9.2"
description: "使用 E2B 云沙箱执行 Python 代码，支持会话级持久沙箱、生命周期控制、文件桥接与模板选择"
repo: "https://github.com/sl251/astrbot_plugin_e2b_sandbox"

requirements:
  - e2b-code-interpreter>=2.2.2,<3.0.0

configs:
  e2b_api_key:
    type: str
    default: ""
    description: "从 https://e2b.dev 获取的 API Key"
  timeout:
    type: int
    default: 60
    description: "单次 Python 代码执行超时（秒）"
  max_output_length:
    type: int
    default: 2000
    description: "返回给 LLM 的最大文本长度"
  proxy:
    type: str
    default: ""
    description: "可选代理地址，例如 http://127.0.0.1:10809"
  default_template:
    type: str
    default: ""
    description: "默认使用的 E2B Template ID，留空时使用默认环境"
  user_whitelist:
    type: list
    default: []
    description: "允许使用插件的用户白名单，填写用户 ID；留空表示禁用插件"
  max_return_file_size_mb:
    type: int
    default: 5
    description: "允许下载并发送给用户的单个生成文件大小上限（MB）"
  file_retention_hours:
    type: int
    default: 24
    description: "data/plugin_data 中导出缓存文件的保留时长（小时）"
