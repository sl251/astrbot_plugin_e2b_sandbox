name: astrbot_plugin_e2b_sandbox
author: sl251
version: "1.0.8"
description: "在 E2B 沙箱中运行 Python 代码，支持 LLM 调用、代理、文件暂存和本地导出发送。"
repo: "https://github.com/sl251/astrbot_plugin_e2b_sandbox"

requirements:
  - e2b-code-interpreter

configs:
  e2b_api_key:
    type: str
    default: ""
    description: "E2B API 密钥，可从 https://e2b.dev 获取"
  timeout:
    type: int
    default: 60
    description: "执行超时时间（秒）"
  max_output_length:
    type: int
    default: 2000
    description: "返回给大语言模型的最大文本长度"
  proxy:
    type: str
    default: ""
    description: "可选代理地址，例如 http://127.0.0.1:10809"
  max_return_file_size_mb:
    type: int
    default: 5
    description: "从沙箱下载并发送给用户的生成文件最大大小（MB）"
  file_retention_hours:
    type: int
    default: 24
    description: "导出的本地文件在清理前保留的时长（小时）"
